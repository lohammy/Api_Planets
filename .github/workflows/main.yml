name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
    
permissions:
  checks: write
  contents: read
  
jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build, run unit tests, and capture results
      run: ./gradlew build test --no-daemon --stacktrace

    - name: Test Report (Unit Tests)
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Unit Tests
        path: app/build/test-results/testDebugUnitTest/TEST-*.xml
        reporter: java-junit
